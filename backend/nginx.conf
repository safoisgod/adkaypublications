# ─────────────────────────────────────────────────────────────────────────────
# Nginx configuration for Publishing House
# Place at: /etc/nginx/sites-available/publishing_house
# Enable: ln -s /etc/nginx/sites-available/publishing_house /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────────────────────────────

upstream django_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name publishinghouse.com www.publishinghouse.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name publishinghouse.com www.publishinghouse.com;

    # ── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/publishinghouse.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/publishinghouse.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' fonts.googleapis.com; font-src 'self' fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self';" always;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/publishing_access.log;
    error_log  /var/log/nginx/publishing_error.log warn;

    # ── Client Settings ──────────────────────────────────────────────────────
    client_max_body_size 20M;
    keepalive_timeout    65;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml font/truetype font/opentype
        application/vnd.ms-fontobject image/svg+xml;

    # ── Frontend (static HTML/CSS/JS) ────────────────────────────────────────
    root /var/www/publishing_house/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── API Proxy → Django/Gunicorn ──────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_app;
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://django_app;
        proxy_set_header Host            $http_host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Restrict admin to specific IPs in production (optional)
        # allow 203.0.113.0/24;
        # deny all;
    }

    # ── Django Static Files ──────────────────────────────────────────────────
    location /static/ {
        alias   /var/www/publishing_house/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
        access_log off;
    }

    # ── Media Files (user uploads) ───────────────────────────────────────────
    location /media/ {
        alias   /var/www/publishing_house/backend/media/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        add_header X-Content-Type-Options "nosniff";

        # Security: prevent executing uploaded scripts
        location ~* \.(php|py|rb|pl|sh|cgi)$ {
            deny all;
        }
    }

    # ── API Schema/Docs (restrict in production) ─────────────────────────────
    location /api/docs/ {
        proxy_pass http://django_app;
        proxy_set_header Host $http_host;
        # Uncomment to restrict to internal IPs only:
        # allow 10.0.0.0/8;
        # deny all;
    }

    # ── Health Check ─────────────────────────────────────────────────────────
    location /health/ {
        access_log off;
        proxy_pass http://django_app;
    }

    # ── Block common attack vectors ──────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|git|svn|htaccess|htpasswd)$ {
        deny all;
    }
}
